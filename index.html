<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DpiDrop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --cream: #FAF7F2;
  --white: #FFFFFF;
  --purple: #C4A8E8;
  --purple-dark: #9B7FD4;
  --purple-pale: #F0EAF8;
  --purple-deep: #6B4FAA;
  --pink: #F2B8C6;
  --pink-pale: #FDE8EF;
  --green: #7EC8A0;
  --green-pale: #E8F8F0;
  --yellow: #F5D87A;
  --text: #2A1F3D;
  --text-mid: #6B5E82;
  --text-light: #A898C0;
  --border: #E0D4F4;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--cream);
  color: var(--text);
  font-family: 'Nunito', -apple-system, sans-serif;
  min-height: 100vh;
  padding-bottom: 200px;
  -webkit-font-smoothing: antialiased;
  position: relative;
  overflow-x: hidden;
}

/* Decorative blobs */
body::before {
  content: '';
  position: fixed;
  width: 280px; height: 280px;
  background: var(--purple-pale);
  border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
  top: -80px; right: -80px;
  z-index: 0;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  width: 200px; height: 200px;
  background: var(--pink-pale);
  border-radius: 40% 60% 30% 70% / 60% 40% 60% 40%;
  bottom: 160px; left: -60px;
  z-index: 0;
  pointer-events: none;
}

.page { position: relative; z-index: 1; }

/* ── Header ── */
.header {
  padding: 56px 24px 32px;
  text-align: left;
  position: relative;
}

.header-tag {
  display: inline-block;
  background: var(--purple);
  color: var(--white);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 30px;
  margin-bottom: 14px;
}

.header h1 {
  font-size: 48px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.0;
  margin-bottom: 12px;
  letter-spacing: -0.02em;
}

.header h1 .accent {
  color: var(--purple-dark);
  display: inline-block;
  position: relative;
}

.header h1 .accent::after {
  content: '';
  position: absolute;
  bottom: 2px; left: 0; right: 0;
  height: 4px;
  background: var(--yellow);
  border-radius: 2px;
}

.header-sub {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-mid);
  line-height: 1.6;
  max-width: 280px;
}

/* Wavy border SVG clip */
.wavy-card {
  position: relative;
  margin: 0 20px;
  background: var(--white);
  border-radius: 24px;
  border: 3px solid var(--purple);
  padding: 36px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  /* Wavy effect via outline */
  box-shadow:
    0 0 0 6px var(--cream),
    0 0 0 9px var(--purple);
}

.wavy-card::before {
  content: '';
  position: absolute;
  inset: -12px;
  border-radius: 30px;
  border: 3px solid var(--purple-pale);
  pointer-events: none;
}

.wavy-card.active,
.wavy-card:active {
  background: var(--purple-pale);
  border-color: var(--purple-dark);
  box-shadow: 0 0 0 6px var(--cream), 0 0 0 9px var(--purple-dark);
}

.drop-emoji {
  font-size: 44px;
  margin-bottom: 14px;
  display: block;
  filter: drop-shadow(0 4px 8px rgba(155,127,212,0.2));
}

.drop-main {
  font-size: 20px;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}

.drop-sub {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 18px;
}

.drop-pills {
  display: flex;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}

.drop-pill {
  font-size: 10px;
  font-weight: 800;
  color: var(--purple-dark);
  background: var(--purple-pale);
  border-radius: 30px;
  padding: 4px 12px;
  letter-spacing: 0.04em;
}

#file-input { display: none; }

/* ── Section ── */
.section { padding: 18px 20px 0; }

/* ── Settings card ── */
.card {
  background: var(--white);
  border-radius: 20px;
  border: 2.5px solid var(--border);
  padding: 20px;
  box-shadow: 0 4px 20px rgba(155,127,212,0.08);
}

.card-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 14px;
}

.pill-group { display: flex; gap: 8px; flex-wrap: wrap; }

.pill-btn {
  flex: 1; min-width: 60px;
  padding: 10px 8px;
  border-radius: 30px;
  border: 2.5px solid var(--border);
  background: var(--cream);
  color: var(--text-mid);
  font-family: inherit;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  letter-spacing: 0.01em;
}

.pill-btn.active {
  background: var(--purple-dark);
  border-color: var(--purple-dark);
  color: #fff;
  box-shadow: 0 4px 14px rgba(107,79,170,0.3);
  transform: translateY(-1px);
}

.pill-btn:active:not(.active) { background: var(--purple-pale); }

.card-divider { height: 1.5px; background: var(--border); margin: 16px 0; }

/* ── File list ── */
.file-list-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.file-total {
  font-size: 14px;
  font-weight: 800;
  color: var(--text);
}

.file-total span {
  color: var(--text-light);
  font-weight: 600;
}

.clear-btn {
  background: var(--cream);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-family: inherit;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.15s;
}
.clear-btn:active { background: var(--pink-pale); border-color: var(--pink); color: #B05070; }

.file-items { display: flex; flex-direction: column; gap: 8px; }

.file-item {
  background: var(--white);
  border-radius: 16px;
  border: 2.5px solid var(--border);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(155,127,212,0.06);
}
.file-item.done { border-color: var(--green); background: var(--green-pale); }
.file-item.processing { border-color: var(--purple); background: var(--purple-pale); }
.file-item.error { border-color: var(--pink); background: var(--pink-pale); }

.file-thumb {
  width: 48px; height: 48px;
  border-radius: 12px;
  overflow: hidden; flex-shrink: 0;
  background: repeating-conic-gradient(#e8e0f0 0% 25%, #fff 0% 50%) 0 0 / 8px 8px;
  border: 2px solid var(--border);
}
.file-thumb img { width: 100%; height: 100%; object-fit: contain; display: block; }

.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.file-sz { font-size: 11px; font-weight: 600; color: var(--text-light); }

.status-pill {
  flex-shrink: 0;
  font-size: 11px; font-weight: 800;
  padding: 5px 12px;
  border-radius: 20px;
  border: 2px solid var(--border);
  color: var(--text-light);
  background: var(--cream);
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.status-pill.processing { color: var(--purple-deep); border-color: var(--purple); background: #fff; }
.status-pill.done { color: #3A8A60; border-color: var(--green); background: #fff; }
.status-pill.error { color: #B05070; border-color: var(--pink); background: #fff; }

.rm-btn { background: none; border: none; cursor: pointer; color: var(--border); font-size: 18px; padding: 2px 4px; line-height: 1; flex-shrink: 0; font-weight: 700; }
.rm-btn:active { color: var(--purple-dark); }

/* ── Note ── */
.note {
  background: var(--white);
  border-radius: 16px;
  border: 2px solid var(--border);
  padding: 14px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-mid);
  line-height: 1.75;
}
.note strong { color: var(--purple-deep); font-weight: 800; }

/* ── Sticky bottom ── */
.action-area {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(250,247,242,0.96);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  padding: 12px 20px 36px;
  border-top: 2.5px solid var(--border);
  z-index: 100;
}

/* Download card */
.dl-card {
  background: var(--white);
  border-radius: 18px;
  border: 2.5px solid var(--green);
  padding: 14px 16px;
  display: none;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
  box-shadow: 0 4px 16px rgba(126,200,160,0.2);
}
.dl-emoji { font-size: 28px; flex-shrink: 0; }
.dl-info { flex: 1; }
.dl-title { font-size: 13px; font-weight: 800; color: var(--text); line-height: 1.3; margin-bottom: 2px; }
.dl-sub { font-size: 11px; font-weight: 600; color: var(--text-light); }
.dl-btn {
  background: var(--green);
  color: #fff;
  border: none; border-radius: 30px;
  padding: 11px 18px;
  font-family: inherit; font-size: 13px; font-weight: 800;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(126,200,160,0.35);
  transition: all 0.15s;
}
.dl-btn:active { background: #5AAA80; transform: scale(0.97); }

/* Progress */
.prog-row { display: none; align-items: center; gap: 10px; margin-bottom: 10px; }
.prog-bg { flex: 1; height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--purple-dark), var(--purple)); border-radius: 10px; width: 0%; transition: width 0.3s ease; }
.prog-label { font-size: 11px; font-weight: 700; color: var(--text-mid); white-space: nowrap; min-width: 54px; text-align: right; }

/* Main button */
.main-btn {
  width: 100%; padding: 18px;
  background: var(--purple-dark);
  color: #fff; border: none; border-radius: 30px;
  font-family: inherit; font-size: 17px; font-weight: 900;
  letter-spacing: 0.01em; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 6px 24px rgba(107,79,170,0.35);
  transition: all 0.2s;
}
.main-btn:active:not(:disabled) {
  transform: scale(0.98) translateY(1px);
  box-shadow: 0 2px 10px rgba(107,79,170,0.2);
}
.main-btn:disabled {
  background: var(--border);
  color: var(--text-light);
  box-shadow: none;
  cursor: not-allowed;
}
</style>
</head>
<body>
<div class="page">

<!-- Header -->
<div class="header">
  <div class="header-tag">✦ Etsy Clipart Tool</div>
  <h1>Dpi<span class="accent">Drop</span></h1>
  <p class="header-sub">PNGを高解像度・大サイズに変換してZIPダウンロード</p>
</div>

<!-- Drop zone -->
<div class="section" style="padding-top:0">
  <div class="wavy-card" id="drop-zone">
    <span class="drop-emoji">🧸</span>
    <div class="drop-main">PNGをタップして選択</div>
    <div class="drop-sub">複数ファイル一括対応</div>
    <div class="drop-pills">
      <span class="drop-pill">PNG</span>
      <span class="drop-pill">複数対応</span>
      <span class="drop-pill">透過保持</span>
      <span class="drop-pill">ZIP出力</span>
    </div>
    <input type="file" id="file-input" accept="image/png" multiple>
  </div>
</div>

<!-- Settings -->
<div class="section">
  <div class="card">
    <div class="card-label">解像度</div>
    <div class="pill-group">
      <button class="pill-btn" data-dpi="72">72 dpi</button>
      <button class="pill-btn" data-dpi="150">150 dpi</button>
      <button class="pill-btn active" data-dpi="300">300 dpi</button>
      <button class="pill-btn" data-dpi="600">600 dpi</button>
    </div>
    <div class="card-divider"></div>
    <div class="card-label">目標サイズ（長辺）</div>
    <div class="pill-group">
      <button class="pill-btn active" data-size="0">そのまま</button>
      <button class="pill-btn" data-size="2000">2000px</button>
      <button class="pill-btn" data-size="3000">3000px</button>
      <button class="pill-btn" data-size="4000">4000px ✦</button>
    </div>
  </div>
</div>

<!-- File list -->
<div class="section" id="file-section" style="display:none">
  <div class="file-list-top">
    <div class="file-total" id="file-total"></div>
    <button class="clear-btn" onclick="clearAll()">すべて削除</button>
  </div>
  <div class="file-items" id="file-items"></div>
</div>

<!-- Note -->
<div class="section" style="padding-bottom: 14px;">
  <div class="note">
    <strong>メモ：</strong> PNGの解像度メタデータを書き換えます。ピクセル数・透過情報はそのまま保持されます。ファイル名は <strong>元のファイル名_300dpi.png</strong> で保存されます。
  </div>
</div>

</div><!-- /page -->

<!-- Sticky bottom -->
<div class="action-area">
  <div class="dl-card" id="dl-card">
    <div class="dl-emoji">🧺</div>
    <div class="dl-info">
      <div class="dl-title">ZIPファイルの準備が<br>できました</div>
      <div class="dl-sub" id="dl-sub"></div>
    </div>
    <button class="dl-btn" id="dl-btn">ダウンロード</button>
  </div>
  <div class="prog-row" id="prog-row">
    <div class="prog-bg"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-label" id="prog-label"></div>
  </div>
  <button class="main-btn" id="main-btn" disabled>
    <span id="btn-text">変換して ZIP ダウンロード</span><span>🧁</span>
  </button>
</div>

<script>
// ═══════════════════════════════════════════════
// ZIP builder (no deps)
// ═══════════════════════════════════════════════
const ZIP = (() => {
  const enc = new TextEncoder();
  function crc32(d) {
    const T = (() => { const t=new Uint32Array(256); for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[i]=c;} return t; })();
    let c=0xFFFFFFFF; for(let i=0;i<d.length;i++) c=T[(c^d[i])&0xFF]^(c>>>8); return(c^0xFFFFFFFF)>>>0;
  }
  function u16(n){return[n&0xFF,(n>>8)&0xFF];}
  function u32(n){return[n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];}
  function cat(...a){const t=a.reduce((s,x)=>s+x.length,0);const o=new Uint8Array(t);let p=0;for(const x of a){o.set(x,p);p+=x.length;}return o;}
  return {
    create(){
      const files=[];
      return {
        add(name,data){const nb=enc.encode(name);files.push({nb,crc:crc32(data),size:data.length,data});},
        build(){
          const locals=[],cdirs=[];let off=0;
          for(const f of files){
            const lh=new Uint8Array([0x50,0x4B,0x03,0x04,...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(f.crc),...u32(f.size),...u32(f.size),...u16(f.nb.length),...u16(0)]);
            const local=cat(lh,f.nb,f.data);
            const cd=new Uint8Array([0x50,0x4B,0x01,0x02,...u16(20),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(f.crc),...u32(f.size),...u32(f.size),...u16(f.nb.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(off)]);
            locals.push(local);cdirs.push(cat(cd,f.nb));off+=local.length;
          }
          const cdir=cat(...cdirs);
          const eocd=new Uint8Array([0x50,0x4B,0x05,0x06,...u16(0),...u16(0),...u16(files.length),...u16(files.length),...u32(cdir.length),...u32(off),...u16(0)]);
          return cat(...locals,cdir,eocd);
        }
      };
    }
  };
})();

// ═══════════════════════════════════════════════
// PNG pHYs rewriter
// ═══════════════════════════════════════════════
const CRCT=(()=>{const t=new Uint32Array(256);for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[i]=c;}return t;})();
function pcrc(b){let c=0xFFFFFFFF;for(let i=0;i<b.length;i++)c=CRCT[(c^b[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}
function b32(n){return new Uint8Array([(n>>>24)&0xFF,(n>>>16)&0xFF,(n>>>8)&0xFF,n&0xFF]);}
function cat2(...a){const t=a.reduce((s,x)=>s+x.length,0);const o=new Uint8Array(t);let p=0;for(const x of a){o.set(x,p);p+=x.length;}return o;}

function rewritePHYs(ab,dpi){
  const ppm=Math.round(dpi/0.0254);
  const src=new Uint8Array(ab);
  let pos=8;const chunks=[];
  while(pos<src.length){
    if(pos+8>src.length)break;
    const len=((src[pos]<<24)|(src[pos+1]<<16)|(src[pos+2]<<8)|src[pos+3])>>>0;
    const type=String.fromCharCode(src[pos+4],src[pos+5],src[pos+6],src[pos+7]);
    const tot=4+4+len+4;
    if(pos+tot>src.length)break;
    chunks.push({type,start:pos,tot});pos+=tot;
  }
  const pt=new Uint8Array([0x70,0x48,0x59,0x73]);
  const pd=new Uint8Array([...b32(ppm),...b32(ppm),1]);
  const np=cat2(b32(9),pt,pd,b32(pcrc(cat2(pt,pd))));
  const parts=[src.slice(0,8)];let inj=false;
  for(const c of chunks){
    if(c.type==='pHYs')continue;
    parts.push(src.slice(c.start,c.start+c.tot));
    if(c.type==='IHDR'&&!inj){parts.push(np);inj=true;}
  }
  if(!inj)parts.splice(1,0,np);
  return cat2(...parts);
}

// ═══════════════════════════════════════════════
// Upscale
// ═══════════════════════════════════════════════
function upscaleImage(file,targetPx){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const longer=Math.max(img.width,img.height);
      if(longer>=targetPx){resolve(null);return;}
      const scale=targetPx/longer;
      const w=Math.round(img.width*scale);
      const h=Math.round(img.height*scale);
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
      ctx.drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>{
        if(!blob){reject(new Error('canvas failed'));return;}
        blob.arrayBuffer().then(buf=>resolve(new Uint8Array(buf))).catch(reject);
      },'image/png');
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('load failed'));};
    img.src=url;
  });
}

// ═══════════════════════════════════════════════
// Download
// ═══════════════════════════════════════════════
function downloadZip(bytes,filename){
  let binary='';
  const chunkSize=8192;
  for(let i=0;i<bytes.length;i+=chunkSize){
    const chunk=bytes.subarray(i,i+chunkSize);
    binary+=String.fromCharCode.apply(null,chunk);
  }
  const base64=btoa(binary);
  const dataUrl='data:application/zip;base64,'+base64;
  const a=document.createElement('a');
  a.href=dataUrl;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════
let files=[],zipBytes=null,uid=0,selDPI=300,selSize=0;

document.querySelectorAll('[data-dpi]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-dpi]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');selDPI=parseInt(btn.dataset.dpi);
  });
});

document.querySelectorAll('[data-size]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-size]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');selSize=parseInt(btn.dataset.size);
  });
});

const dz=document.getElementById('drop-zone');
const fi=document.getElementById('file-input');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('active');});
dz.addEventListener('dragleave',()=>dz.classList.remove('active'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('active');addFiles([...e.dataTransfer.files].filter(f=>f.type==='image/png'));});
fi.addEventListener('change',()=>{addFiles([...fi.files]);fi.value='';});

function addFiles(nf){
  nf.forEach(f=>files.push({file:f,id:uid++,url:URL.createObjectURL(f),status:'waiting'}));
  render();syncBtn();resetDL();
}
function removeFile(id){
  const i=files.findIndex(e=>e.id===id);
  if(i!==-1){URL.revokeObjectURL(files[i].url);files.splice(i,1);}
  render();syncBtn();resetDL();
}
function clearAll(){
  files.forEach(e=>URL.revokeObjectURL(e.url));files=[];
  render();syncBtn();resetDL();
}

function render(){
  const sec=document.getElementById('file-section');
  const items=document.getElementById('file-items');
  const tot=document.getElementById('file-total');
  sec.style.display=files.length?'block':'none';
  const mb=(files.reduce((s,e)=>s+e.file.size,0)/1024/1024).toFixed(1);
  tot.innerHTML=`${files.length}枚 <span>· ${mb} MB</span>`;
  items.innerHTML='';
  files.forEach(e=>{
    const kb=Math.round(e.file.size/1024);
    const sz=kb>=1024?`${(kb/1024).toFixed(1)} MB`:`${kb} KB`;
    const lbl={waiting:'待機中',processing:'変換中...',done:'✓ 完了',error:'エラー'};
    const d=document.createElement('div');
    d.className=`file-item${e.status!=='waiting'?' '+e.status:''}`;
    d.id=`fi-${e.id}`;
    d.innerHTML=`
      <div class="file-thumb"><img src="${e.url}" loading="lazy"></div>
      <div class="file-info">
        <div class="file-name">${e.file.name}</div>
        <div class="file-sz">${sz}</div>
      </div>
      <span class="status-pill ${e.status}" id="sp-${e.id}">${lbl[e.status]}</span>
      <button class="rm-btn" onclick="removeFile(${e.id})">×</button>
    `;
    items.appendChild(d);
  });
}

function setStatus(id,st){
  return new Promise(resolve=>{
    const e=files.find(f=>f.id===id);if(e)e.status=st;
    const item=document.getElementById(`fi-${id}`);
    const pill=document.getElementById(`sp-${id}`);
    if(!item||!pill){resolve();return;}
    const lbl={waiting:'待機中',processing:'変換中...',done:'✓ 完了',error:'エラー'};
    item.className=`file-item${st!=='waiting'?' '+st:''}`;
    pill.className=`status-pill ${st}`;
    pill.textContent=lbl[st]||st;
    requestAnimationFrame(()=>requestAnimationFrame(resolve));
  });
}

function syncBtn(){document.getElementById('main-btn').disabled=files.length===0;}
function resetDL(){zipBytes=null;document.getElementById('dl-card').style.display='none';document.getElementById('btn-text').textContent='変換して ZIP ダウンロード';}

document.getElementById('main-btn').addEventListener('click',async()=>{
  if(!files.length)return;
  const dpi=selDPI;
  const btn=document.getElementById('main-btn');
  const progRow=document.getElementById('prog-row');
  const progFill=document.getElementById('prog-fill');
  const progLabel=document.getElementById('prog-label');
  const dlCard=document.getElementById('dl-card');

  btn.disabled=true;
  progRow.style.display='flex';
  progFill.style.width='0%';
  dlCard.style.display='none';
  zipBytes=null;

  for(const e of files) await setStatus(e.id,'waiting');

  const zip=ZIP.create();
  let done=0,errs=0;

  for(let i=0;i<files.length;i++){
    const e=files[i];
    await setStatus(e.id,'processing');
    document.getElementById(`fi-${e.id}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
    progLabel.textContent=`${i+1} / ${files.length}`;
    progFill.style.width=`${Math.round(i/files.length*88)}%`;
    await new Promise(r=>setTimeout(r,80));

    try{
      let data;
      if(selSize>0){
        try{
          const up=await upscaleImage(e.file,selSize);
          data=rewritePHYs(up?up.buffer:await e.file.arrayBuffer(),dpi);
        }catch(ue){
          console.warn('upscale failed:',ue);
          data=rewritePHYs(await e.file.arrayBuffer(),dpi);
        }
      }else{
        data=rewritePHYs(await e.file.arrayBuffer(),dpi);
      }
      const name=e.file.name.replace(/\.png$/i,'')+`_${dpi}dpi.png`;
      zip.add(name,data);done++;
      await setStatus(e.id,'done');
    }catch(err){
      console.error(e.file.name,err);errs++;
      await setStatus(e.id,'error');
    }
  }

  progLabel.textContent='ZIP生成中...';
  await new Promise(r=>setTimeout(r,50));

  try{
    zipBytes=zip.build();
    progFill.style.width='100%';
    const mb=(zipBytes.length/1024/1024).toFixed(1);
    document.getElementById('dl-sub').textContent=`${done}枚 · ${mb} MB`;
    dlCard.style.display='flex';
    progLabel.textContent=errs>0?`完了（${errs}件エラー）`:'完了！';
    document.getElementById('btn-text').textContent='もう一度変換する 🧁';
  }catch(err){
    progLabel.textContent='ZIP生成に失敗しました';
    console.error(err);
  }
  btn.disabled=false;
});

document.getElementById('dl-btn').addEventListener('click',()=>{
  if(!zipBytes)return;
  downloadZip(zipBytes,`dpidrop_${selDPI}dpi_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.zip`);
});
</script>
</body>
